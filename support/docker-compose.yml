services:
  postgres:
    image: ${PGCHECK_POSTGRES_IMAGE:-postgres:16.3}
    container_name: pgcheck-postgres
    env_file:
      - env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgcheck -d pgcheck_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
